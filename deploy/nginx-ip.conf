# PencilBear AI (English) — IP-based HTTP config (no domain / no SSL)
# Used for first deploy on http://<server-ip>. Swap to deploy/nginx.conf once a
# domain + Let's Encrypt cert are in place.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /www/pencilbear-ai/dist;
    index index.html;

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Alipay async notify (form body)
    location = /api/alipay/notify {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin panel
    location /admin.html {
        try_files /admin.html =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
