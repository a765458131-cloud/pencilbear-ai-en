server {
    listen 80;
    server_name pencilbear.ai www.pencilbear.ai;

    # 默认放行 ACME 挑战（Let's Encrypt 申请证书用）
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # 其余 80 端口请求全部转发到 443（HTTPS）
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name pencilbear.ai www.pencilbear.ai;

    # === SSL 证书（Let's Encrypt 自动生成） ===
    ssl_certificate     /etc/letsencrypt/live/pencilbear.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pencilbear.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 前端静态资源（dist/）
    root /www/pencilbear-ai/dist;
    index index.html;

    # 后端 API / 管理后台代理到 Node (3002)
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 支付宝异步通知需要表单解析，单独处理
    location = /api/alipay/notify {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 管理后台（静态文件，由前端 history 路由处理）
    location /admin.html {
        try_files /admin.html =404;
    }

    # SPA 回退（前端路由）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 简单缓存策略
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
