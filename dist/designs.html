<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>My Designs — PencilBear AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
      background: #06060e;
      color: #e8e8f0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ===== Top Nav ===== */
    .d-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(6,6,14,0.9); backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 100;
    }
    .d-back {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: rgba(255,255,255,0.45);
      cursor: pointer; transition: color 0.2s;
    }
    .d-back:hover { color: #a78bfa; }
    .d-back svg { width: 16px; height: 16px; }
    .d-title {
      font-size: 15px; font-weight: 600; color: #a78bfa;
      letter-spacing: 0.3px;
    }
    .d-user { display: flex; align-items: center; gap: 10px; }
    .d-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: #fff;
    }
    .d-email { font-size: 11px; color: rgba(255,255,255,0.35); }

    /* ===== Main Content ===== */
    .d-main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 80px; }

    /* ===== Stats Row (matching Chinese version) ===== */
    .d-stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
      margin-bottom: 36px;
    }
    .d-stat-card {
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 18px 20px;
      transition: border-color 0.25s, transform 0.25s;
    }
    .d-stat-card:hover { border-color: rgba(167,139,250,0.18); transform: translateY(-1px); }
    .d-stat-num {
      font-size: 30px; font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #6366f1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1.15;
    }
    .d-stat-label {
      font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 4px;
    }

    /* ===== Order Card (matching Chinese version style) ===== */
    .d-order-card {
      margin-bottom: 24px;
    }
    .d-order-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 10px;
    }
    .d-order-brand {
      font-size: 19px; font-weight: 700; color: #fff;
      line-height: 1.3;
    }
    .d-order-date {
      font-size: 11.5px; color: rgba(255,255,255,0.25); margin-top: 2px;
    }
    .d-badge {
      display: inline-block; padding: 4px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.4px;
    }
    .d-badge-delivered   { background: rgba(52,211,153,0.1); color: #34d399; }
    .d-badge-processing   { background: rgba(96,165,250,0.1); color: #60a5fa; }
    .d-badge-pending     { background: rgba(251,191,36,0.1); color: #fbbf24; }
    .d-badge-generating  { background: rgba(167,139,250,0.1); color: #a78bfa; }

    /* ===== Design Sheet Container (white bg like Chinese version) ===== */
    .d-design-sheet {
      background: #fafafa; border-radius: 10px; padding: 16px;
      margin-top: 12px; position: relative; overflow: hidden;
    }
    .d-designs-grid {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px;
    }
    .d-thumb {
      aspect-ratio: 1; border-radius: 4px; overflow: hidden;
      cursor: pointer; position: relative;
      background: #eee; border: 1px solid rgba(0,0,0,0.06);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .d-thumb:hover { transform: scale(1.06); box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 1; }
    .d-thumb img { width: 100%; height: 100%; object-fit: contain; background: #fff; }

    /* ===== Generating Placeholder Animation ===== */
    .d-generating-placeholder {
      background: linear-gradient(135deg, #1a1a2e 0%, #16162a 50%, #0f0f1a 100%);
      border-radius: 10px; padding: 48px 24px; text-align: center;
      margin-top: 12px; position: relative; overflow: hidden;
    }
    .d-generating-placeholder::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(99,102,241,0.08), transparent 70%);
    }
    .dg-icon {
      width: 56px; height: 56px; margin: 0 auto 16px; position: relative;
    }
    .dg-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid rgba(167,139,250,0.15);
      border-top-color: #a78bfa; animation: dgSpin 0.8s linear infinite;
    }
    .dg-inner {
      position: absolute; inset: 8px; border-radius: 50%;
      border: 1.5px solid rgba(99,102,241,0.12);
      border-bottom-color: #6366f1; animation: dgSpin 1.2s linear infinite reverse;
    }
    @keyframes dgSpin { to { transform: rotate(360deg); } }
    .dg-text {
      font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.7);
      letter-spacing: 0.5px;
    }
    .dg-sub {
      font-size: 12px; color: rgba(255,255,255,0.25); margin-top: 6px;
    }
    .dg-dots span {
      animation: dgDot 1.4s ease-in-out infinite;
      display: inline-block; opacity: 0;
    }
    .dg-dots span:nth-child(2) { animation-delay: 0.2s; }
    .dg-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dgDot { 0%, 80% { opacity: 0 } 40% { opacity: 1 } }

    /* ===== Empty State ===== */
    .d-empty {
      text-align: center; padding: 80px 20px;
      color: rgba(255,255,255,0.2);
    }
    .d-empty svg { width: 64px; height: 64px; margin: 0 auto 16px; opacity: 0.2; display: block; }
    .d-empty-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; color: rgba(255,255,255,0.3); }
    .d-empty-sub { font-size: 13px; color: rgba(255,255,255,0.2); }

    /* ===== Lightbox ===== */
    .d-lb {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(16px);
      align-items: center; justify-content: center;
    }
    .d-lb.active { display: flex; }
    .d-lb img { max-width: 90vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
    .d-lb-close {
      position: absolute; top: 18px; right: 22px;
      font-size: 34px; color: #fff; cursor: pointer;
      opacity: 0.5; transition: opacity 0.2s; line-height: 1;
    }
    .d-lb-close:hover { opacity: 1; }

    /* ===== Login Wall ===== */
    .d-login-wall { text-align: center; padding: 100px 20px; }
    .d-login-wall h2 { font-size: 21px; margin-bottom: 10px; }
    .d-login-wall p { color: rgba(255,255,255,0.35); margin-bottom: 24px; font-size: 14px; }
    .d-login-btn {
      display: inline-block; padding: 11px 30px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      border-radius: 10px; font-size: 14.5px; font-weight: 600;
      color: #fff; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    .d-login-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(99,102,241,0.3); }

    /* ===== Loading ===== */
    .d-loading { text-align: center; padding: 60px; color: rgba(255,255,255,0.25); }
    .d-spinner {
      width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.07);
      border-top-color: #a78bfa; border-radius: 50%;
      animation: dSpin 0.7s linear infinite; margin: 0 auto 14px;
    }
    @keyframes dSpin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      .d-stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .d-topbar { padding: 12px 16px; }
      .d-email { display: none; }
      .d-designs-grid { grid-template-columns: repeat(4, 1fr); }
      .d-stat-num { font-size: 26px; }
    }
    @media (max-width: 480px) {
      .d-stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .d-designs-grid { grid-template-columns: repeat(3, 1fr); }
      .d-stat-num { font-size: 22px; }
      .d-main { padding: 20px 14px 60px; }
    }
  </style>
</head>
<body>

<!-- Top Bar -->
<div class="d-topbar">
  <div class="d-back" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
    Back to Home
  </div>
  <div class="d-title">My Logo Design Library</div>
  <div class="d-user">
    <div class="d-avatar" id="dAvatar">A</div>
    <span class="d-email" id="dEmail"></span>
  </div>
</div>

<!-- Main -->
<div class="d-main" id="dMain">
  <div class="d-loading" id="dLoading">
    <div class="d-spinner"></div>
    Loading your designs...
  </div>
</div>

<!-- Lightbox -->
<div class="d-lb" id="dLb" onclick="this.classList.remove('active')">
  <button class="d-lb-close">&times;</button>
  <img src="" alt="" id="dLbImg">
</div>

<script>
  const API_BASE = (location.protocol === 'file:') ? 'http://localhost:3002' : '';
  const SESSION_KEY = 'pencilbear_session';
  const ORDERS_KEY = 'pencilbear_orders';

  function getSession() {
    try { return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); } catch { return null; }
  }
  function getOrders() {
    try { return JSON.parse(localStorage.getItem(ORDERS_KEY) || '[]'); } catch { return []; }
  }

  // Sync locally-stored design requests to the backend so they show up in admin.
  // Backend deduplicates by email + brand + createdAt, so repeated calls are safe.
  function syncDesignRequests(orders) {
    try {
      const email = (getSession() || {}).email || '';
      orders.forEach(function(o) {
        fetch(API_BASE + '/api/designs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('pencilbear_token') || '') },
          body: JSON.stringify({
            email: email || o.email || o.userEmail || '',
            brandName: getBrandName(o),
            industry: o.industry || 'unspecified',
            colorMode: o.colorMode || 'unspecified',
            createdAt: o.createdAt || o.created_at || o.date || Date.now()
          })
        }).catch(function(){});
      });
    } catch (e) {}
  }

  // Extract brand name from order — supports both localStorage and server formats
  function getBrandName(o) {
    return o.brandName || o.brand || o.brand_name || 'Untitled Brand';
  }

  function fmtDate(ts) {
    if (!ts) return '';
    const d = new Date(typeof ts === 'number' && ts > 9999999999 ? ts : ts * 1000);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function getStatusBadge(status) {
    if (status === 'completed' || status === 'delivered')
      return '<span class="d-badge d-badge-delivered">Delivered</span>';
    if (status === 'processing')
      return '<span class="d-badge d-badge-processing">Processing</span>';
    if (status === 'pending')
      return '<span class="d-badge d-badge-generating">Generating<span class="dg-dots"><span>.</span><span>.</span><span>.</span></span></span>';
    return `<span class="d-badge d-badge-pending">${status}</span>`;
  }

  function openLb(src) {
    document.getElementById('dLbImg').src = src;
    document.getElementById('dLb').classList.add('active');
  }

  // Generating placeholder HTML
  const generatingHtml = `
    <div class="d-generating-placeholder">
      <div class="dg-icon"><div class="dg-ring"></div><div class="dg-inner"></div></div>
      <div class="dg-text">AI Visual Generating<span class="dg-dots"><span>.</span><span>.</span><span>.</span></span></div>
      <div class="dg-sub">Your minimalist logos are being crafted by AI</div>
    </div>`;

  async function init() {
    const session = getSession();
    const mainEl = document.getElementById('dMain');

    // Set user info in topbar
    if (session) {
      document.getElementById('dAvatar').textContent =
        (session.username || session.email || '?').charAt(0).toUpperCase();
      document.getElementById('dEmail').textContent = session.email || '';
    }

    // Not logged in
    if (!session) {
      mainEl.innerHTML = `
        <div class="d-login-wall">
          <h2>Please sign in first</h2>
          <p>You need to be signed in to view your design library.</p>
          <div class="d-login-btn" onclick="window.location.href='index.html'">Go to Sign In</div>
        </div>`;
      return;
    }

    // Load orders from localStorage (primary source for design data)
    let orders = getOrders();

    // Filter: only show current user's orders
    orders = orders.filter(o =>
      o.userEmail === session.email || o.email === session.email
    );

    // Push any locally-stored requests to the backend (admin visibility)
    syncDesignRequests(orders);

    // Calculate stats
    const seenBrands = new Set();
    let totalDesigns = 0;
    let pendingCount = 0;
    let deliveredCount = 0;

    orders.forEach(o => {
      const bname = getBrandName(o);
      const designs = o.designs || [];
      totalDesigns += designs.length;

      if (o.status === 'completed' || o.status === 'delivered') {
        deliveredCount++;
        seenBrands.add(bname.toLowerCase());
      } else {
        pendingCount++;
      }
    });

    // Render empty state
    if (orders.length === 0) {
      mainEl.innerHTML = `
        <div class="d-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="4"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="m21 15-5-5L5 21"/>
          </svg>
          <div class="d-empty-title">No designs yet</div>
          <div class="d-empty-sub">Enter a brand name on the homepage to generate your first logo designs.</div>
        </div>`;
      return;
    }

    // Render page
    mainEl.innerHTML = `
      <!-- Stats -->
      <div class="d-stats">
        <div class="d-stat-card">
          <div class="d-stat-num">${orders.length}</div>
          <div class="d-stat-label">Total Orders</div>
        </div>
        <div class="d-stat-card">
          <div class="d-stat-num">${totalDesigns}</div>
          <div class="d-stat-label">Designs Delivered</div>
        </div>
        <div class="d-stat-card">
          <div class="d-stat-num">${seenBrands.size}</div>
          <div class="d-stat-label">Completed Brands</div>
        </div>
        <div class="d-stat-card">
          <div class="d-stat-num">${pendingCount}</div>
          <div class="d-stat-label">Pending Delivery</div>
        </div>
      </div>

      <!-- Orders list -->
      ${orders.map((o) => {
        const brand = getBrandName(o);
        const designs = o.designs || [];
        const hasDesigns = designs.length > 0;
        const isPending = o.status !== 'completed' && o.status !== 'delivered';

        return `
        <div class="d-order-card">
          <div class="d-order-header">
            <div>
              <div class="d-order-brand">${brand}</div>
              <div class="d-order-date">${fmtDate(o.createdAt || o.created_at || o.date)}</div>
            </div>
            ${getStatusBadge(o.status)}
          </div>
          ${isPending && !hasDesigns ? generatingHtml : ''}
          ${hasDesigns ? `
          <div class="d-design-sheet">
            <div class="d-designs-grid">
              ${designs.map((d, di) => {
                // Support multiple image URL field names
                const src = d.imageData || d.url || d.src || d.image || d.thumb ||
                          (typeof d === 'string' ? d : '');
                return `<div class="d-thumb" onclick="openLb('${src}')">
                  <img src="${src}" alt="${brand} — Design ${di+1}"
                       onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2214%22>No Image</text></svg>'"
                       loading="lazy">
                </div>`;
              }).join('')}
            </div>
          </div>` : ''}
        </div>`;
      }).join('')}
    `;
  }

  init();
</script>

</body>
</html>
